<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♡ Celestial Fury ♡ Batalla ♡</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎀</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/game-features.css">
</head>
<body class="game-page">

<div class="game-container">
    <div class="player-section player-1">
        <h2 class="player-title">Tu Equipo</h2>
        <div class="characters-display" id="playerDisplay"></div>
        <div class="health-bar">
            <div class="health-fill" id="playerHealthFill" style="width: 100%"></div>
            <span class="health-text" id="playerHealthText">100 / 100</span>
        </div>
    </div>

    <div class="battle-arena">
        <div class="arena-title">⚡ BATALLA ⚡</div>
        <div class="battle-status" id="battleStatus">Conectando...</div>
        <div class="battle-effects" id="battleEffects"></div>
    </div>

    <div class="player-section player-2">
        <h2 class="player-title">Equipo Oponente</h2>
        <div class="characters-display" id="opponentDisplay"></div>
        <div class="health-bar">
            <div class="health-fill" id="opponentHealthFill" style="width: 100%"></div>
            <span class="health-text" id="opponentHealthText">100 / 100</span>
        </div>
    </div>
</div>

<div class="controls-section">
    <div class="flower-controller" id="controller-container">
    </div>
</div>

<script src="js/constants.js" defer></script>
<script src="js/utils.js" defer></script>
<script src="js/socketClient.js" defer></script>
<script src="js/gameInit.js" defer></script>
<script src="js/characterManager.js" defer></script>
<script src="js/virtualController.js" defer></script>
<script src="js/gameController.js" defer></script>
<script src="js/app.js" defer></script>
<script src="js/difficulty.js" defer></script>
<script src="js/enemies.js" defer></script>
<script src="js/animations.js" defer></script>
<script src="js/controls.js" defer></script>

<script>
    let socket;

    function conectar() {
        socket = new WebSocket("ws://localhost:8080/game");

        socket.onopen = function () {
            console.log("Conectado al servidor");
        };

        socket.onmessage = function (event) {
            console.log("Mensaje recibido:", event.data);

            const data = JSON.parse(event.data);
            actualizarPelea(data);
        };

        socket.onclose = function () {
            console.log("Conexión cerrada");
        };

        socket.onerror = function (error) {
            console.error("Error:", error);
        };
    }

    function enviarAccion(accion) {
        const mensaje = {
            tipo: "ACCION",
            accion: accion
        };

        socket.send(JSON.stringify(mensaje));
    }

    function actualizarPelea(data) {
        // Ejemplo de cómo mostrar la pelea
        document.getElementById("vidaJugador").innerText = data.vidaJugador;
        document.getElementById("vidaEnemigo").innerText = data.vidaEnemigo;
        document.getElementById("log").innerText = data.mensaje;
    }

    // Conectar apenas cargue la página
    window.onload = conectar;
</script>
</body>
</html>
